# Gitea Actions CI/CD — server-side build + deploy.
#
# Why server-side build: the Dockerfile uses a PARENT build context (it COPYs
# `rvote-online/...` and the sibling `encryptid-sdk/`), so the old `docker build .`
# in the repo root never matched the Dockerfile and the registry image was never
# consistent. Building on the deploy host (where both siblings live under
# /opt/websites) is the path that actually works, and matches the manual deploy.
#
# Deploys from the branch that was pushed (dev is the live branch for rvote).
name: CI/CD

on:
  push:
    branches: [dev]   # rvote deploys from dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: docker:cli
    steps:
      - name: Setup
        run: apk add --no-cache openssh-client

      - name: Deploy (server-side build, build-first)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} '
            set -e
            cd /opt/websites/rvote-online
            git fetch origin -q
            git checkout ${{ github.ref_name }} -q
            git reset --hard origin/${{ github.ref_name }}
            [ -d /opt/websites/encryptid-sdk ] || cp -r /opt/apps/encryptid-sdk /opt/websites/encryptid-sdk
            docker compose build rvote
            docker compose up -d rvote
          '

      - name: Smoke test
        run: |
          sleep 12
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} \
            "docker exec rvote-online-rvote-1 node -e 'fetch(\"http://127.0.0.1:3000/\").then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))'" \
          && echo "smoke ok" || (echo "smoke FAILED" && exit 1)
